services:

  excel-automation:

    build: .

    environment:
      PYTHONPATH: /app

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

    command:
      [
        "python",
        "-m",
        "src.main",
        "--input",
        "data/input/sales.xlsx",
        "--output",
        "data/output/report.xlsx"
      ]